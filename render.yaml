services:
  - type: web
    name: edo-system
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: edo-db
          property: connectionString

databases:
  - name: edo-db
    plan: free
