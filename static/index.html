<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ЭДО - Электронный документооборот</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#2563eb;--primary-light:#3b82f6;--primary-dark:#1d4ed8;--success:#16a34a;--success-light:#22c55e;--warning:#d97706;--warning-light:#f59e0b;--danger:#dc2626;--danger-light:#ef4444;--info:#0891b2;--info-light:#06b6d4;--g50:#f9fafb;--g100:#f3f4f6;--g200:#e5e7eb;--g300:#d1d5db;--g400:#9ca3af;--g500:#6b7280;--g600:#4b5563;--g700:#374151;--g800:#1f2937;--g900:#111827;--bg:#f3f4f6;--bg-card:#fff;--bg-sidebar:#1e293b;--text:#111827;--text-secondary:#6b7280;--text-inverse:#fff;--border:#e5e7eb;--shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);--shadow-lg:0 10px 15px -3px rgba(0,0,0,.1),0 4px 6px -2px rgba(0,0,0,.05);--radius:8px;--radius-sm:4px;--radius-lg:12px;--sidebar-w:260px}
[data-theme="dark"]{--bg:#0f172a;--bg-card:#1e293b;--bg-sidebar:#0f172a;--text:#f1f5f9;--text-secondary:#94a3b8;--text-inverse:#0f172a;--border:#334155;--shadow:0 1px 3px rgba(0,0,0,.3);--shadow-lg:0 10px 15px -3px rgba(0,0,0,.3);--g50:#1e293b;--g100:#1e293b;--g200:#334155;--g300:#475569;--g400:#64748b;--g500:#94a3b8;--g600:#cbd5e1;--g700:#e2e8f0;--g800:#f1f5f9;--g900:#f8fafc}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--primary);text-decoration:none}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit;font-size:.875rem}
.hidden{display:none!important}
#authPage{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--primary) 0%,#7c3aed 100%)}
.auth-card{background:var(--bg-card);border-radius:var(--radius-lg);padding:2.5rem;width:100%;max-width:420px;box-shadow:var(--shadow-lg)}
.auth-card h1{font-size:1.75rem;font-weight:700;text-align:center;margin-bottom:.25rem;color:var(--primary)}
.auth-card p.sub{text-align:center;color:var(--text-secondary);margin-bottom:1.5rem;font-size:.875rem}
.auth-tabs{display:flex;gap:.5rem;margin-bottom:1.5rem}
.auth-tabs button{flex:1;padding:.625rem;border:2px solid var(--border);background:transparent;border-radius:var(--radius);font-weight:600;color:var(--text-secondary);transition:.2s}
.auth-tabs button.active{border-color:var(--primary);color:var(--primary);background:rgba(37,99,235,.05)}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:.8rem;font-weight:600;margin-bottom:.375rem;color:var(--text-secondary)}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:.625rem .75rem;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);transition:.2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.auth-error{color:var(--danger);font-size:.8rem;margin-bottom:.75rem;text-align:center}
.btn{display:inline-flex;align-items:center;gap:.375rem;padding:.5rem 1rem;border:none;border-radius:var(--radius);font-size:.8125rem;font-weight:600;transition:.2s;line-height:1.4;white-space:nowrap}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-dark)}
.btn-success{background:var(--success);color:#fff}.btn-success:hover{background:#15803d}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:#b91c1c}
.btn-warning{background:var(--warning);color:#fff}.btn-warning:hover{background:#b45309}
.btn-info{background:var(--info);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}.btn-outline:hover{background:var(--g100)}
.btn-sm{padding:.3rem .625rem;font-size:.75rem}
.btn-lg{padding:.75rem 1.5rem;font-size:.9375rem}
.btn-block{width:100%;justify-content:center}
#appWrap{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);background:var(--bg-sidebar);color:#cbd5e1;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform .3s}
.sidebar-logo{padding:1.25rem 1.5rem;font-size:1.5rem;font-weight:700;color:#fff;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-nav{flex:1;overflow-y:auto;padding:.75rem 0}
.nav-item{display:flex;align-items:center;gap:.75rem;padding:.625rem 1.5rem;color:#94a3b8;font-size:.875rem;font-weight:500;cursor:pointer;transition:.15s;position:relative;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{color:#e2e8f0;background:rgba(255,255,255,.05)}
.nav-item.active{color:#fff;background:rgba(37,99,235,.2);border-right:3px solid var(--primary)}
.nav-item .badge-count{margin-left:auto;background:var(--danger);color:#fff;font-size:.65rem;padding:.1rem .4rem;border-radius:9px;font-weight:700;min-width:18px;text-align:center}
.nav-section{padding:.5rem 1.5rem;font-size:.65rem;font-weight:700;text-transform:uppercase;color:#475569;margin-top:.5rem;letter-spacing:.05em}
.sidebar-user{padding:1rem 1.5rem;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:.75rem}
.user-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.875rem;color:#fff;flex-shrink:0}
.sidebar-user .user-info{flex:1;min-width:0}
.sidebar-user .user-name{font-size:.8125rem;font-weight:600;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-user .user-role{font-size:.7rem;color:#64748b}
.sidebar-user .logout-btn{background:none;border:none;color:#64748b;cursor:pointer;padding:.25rem;font-size:1.1rem}
.sidebar-user .logout-btn:hover{color:var(--danger-light)}
.main-content{flex:1;margin-left:var(--sidebar-w);min-height:100vh}
.top-bar{position:sticky;top:0;z-index:50;background:var(--bg-card);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;gap:1rem}
.burger{display:none;background:none;border:none;font-size:1.5rem;color:var(--text);cursor:pointer}
.top-search{flex:1;max-width:400px;position:relative}
.top-search input{width:100%;padding:.5rem .75rem .5rem 2.25rem;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:.8125rem}
.top-search input:focus{outline:none;border-color:var(--primary)}
.top-search-icon{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);font-size:.8rem;color:var(--text-secondary)}
.top-actions{margin-left:auto;display:flex;align-items:center;gap:.5rem}
.theme-toggle{background:none;border:1px solid var(--border);border-radius:var(--radius);padding:.375rem .625rem;cursor:pointer;font-size:1rem;color:var(--text)}
.page-content{padding:1.5rem}
.page-title{font-size:1.5rem;font-weight:700;margin-bottom:1.25rem}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.card-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border);font-weight:600;display:flex;align-items:center;justify-content:space-between}
.card-body{padding:1.25rem}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:1.5rem}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;box-shadow:var(--shadow)}
.stat-card .stat-label{font-size:.75rem;color:var(--text-secondary);font-weight:600;text-transform:uppercase}
.stat-card .stat-value{font-size:1.75rem;font-weight:700;margin:.25rem 0}
.stat-card .stat-sub{font-size:.75rem;color:var(--text-secondary)}
.stat-card.primary{border-left:4px solid var(--primary)}.stat-card.warning{border-left:4px solid var(--warning)}.stat-card.success{border-left:4px solid var(--success)}.stat-card.danger{border-left:4px solid var(--danger)}.stat-card.info{border-left:4px solid var(--info)}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.8125rem}
th{text-align:left;padding:.625rem .75rem;border-bottom:2px solid var(--border);font-weight:600;color:var(--text-secondary);white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--text)}
td{padding:.625rem .75rem;border-bottom:1px solid var(--border);vertical-align:middle}
tr:hover td{background:var(--g50)}
.badge{display:inline-block;padding:.2rem .5rem;border-radius:9px;font-size:.7rem;font-weight:600;white-space:nowrap}
.badge-draft{background:#e5e7eb;color:#374151}.badge-pending{background:#fef3c7;color:#92400e}.badge-approved{background:#d1fae5;color:#065f46}.badge-rejected{background:#fee2e2;color:#991b1b}.badge-resolved{background:#c7d2fe;color:#3730a3}.badge-archived{background:#e0e7ff;color:#3730a3}
.badge-low{background:#d1fae5;color:#065f46}.badge-medium{background:#fef3c7;color:#92400e}.badge-high{background:#fee2e2;color:#991b1b}.badge-critical{background:#7f1d1d;color:#fecaca}
.tag{display:inline-block;padding:.15rem .4rem;border-radius:var(--radius-sm);font-size:.65rem;font-weight:600;margin:.1rem;border:1px solid transparent}
.tag-red{background:#fee2e2;color:#991b1b;border-color:#fca5a5}.tag-blue{background:#dbeafe;color:#1e40af;border-color:#93c5fd}.tag-green{background:#d1fae5;color:#065f46;border-color:#6ee7b7}.tag-yellow{background:#fef3c7;color:#92400e;border-color:#fcd34d}.tag-purple{background:#ede9fe;color:#5b21b6;border-color:#a78bfa}.tag-pink{background:#fce7f3;color:#9d174d;border-color:#f9a8d4}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal-card{background:var(--bg-card);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);width:100%;max-width:540px;max-height:90vh;overflow-y:auto}
.modal-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:1.125rem;font-weight:700}
.modal-close{background:none;border:none;font-size:1.5rem;color:var(--text-secondary);cursor:pointer}
.modal-body{padding:1.5rem}
.modal-footer{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:.5rem}
.toast-container{position:fixed;top:1rem;right:1rem;z-index:300;display:flex;flex-direction:column;gap:.5rem}
.toast{padding:.75rem 1rem;border-radius:var(--radius);color:#fff;font-size:.8125rem;font-weight:500;min-width:280px;box-shadow:var(--shadow-lg);animation:slideIn .3s ease-out;display:flex;align-items:center;gap:.5rem}
.toast-success{background:var(--success)}.toast-error{background:var(--danger)}.toast-info{background:var(--info)}.toast-warning{background:var(--warning)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideOut{from{transform:translateX(0);opacity:1}to{transform:translateX(100%);opacity:0}}
.star-btn{background:none;border:none;font-size:1rem;cursor:pointer;padding:.125rem;color:var(--g400)}.star-btn.active{color:#f59e0b}
.chk{width:16px;height:16px;cursor:pointer;accent-color:var(--primary)}
.kanban-board{display:flex;gap:1rem;overflow-x:auto;padding-bottom:1rem;min-height:500px}
.kanban-col{flex:0 0 280px;background:var(--bg);border-radius:var(--radius);padding:.75rem}
.kanban-col-header{font-size:.8125rem;font-weight:700;margin-bottom:.75rem;display:flex;align-items:center;justify-content:space-between}
.kanban-col-header .count{background:var(--g200);color:var(--text-secondary);font-size:.7rem;padding:.1rem .4rem;border-radius:9px}
.kanban-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:.75rem;margin-bottom:.5rem;cursor:pointer;transition:.15s}
.kanban-card:hover{box-shadow:var(--shadow)}
.kanban-card .kc-title{font-size:.8125rem;font-weight:600;margin-bottom:.375rem}
.kanban-card .kc-meta{font-size:.7rem;color:var(--text-secondary);display:flex;gap:.5rem;flex-wrap:wrap}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.cal-header h3{font-size:1.125rem;font-weight:700}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.cal-day-header{background:var(--g100);padding:.5rem;text-align:center;font-size:.75rem;font-weight:600;color:var(--text-secondary)}
.cal-day{background:var(--bg-card);min-height:100px;padding:.375rem;font-size:.75rem}
.cal-day.today{background:rgba(37,99,235,.05)}.cal-day.other-month{opacity:.4}
.cal-day .day-num{font-weight:600;margin-bottom:.25rem}
.cal-day.today .day-num{background:var(--primary);color:#fff;width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center}
.cal-doc{background:var(--primary);color:#fff;padding:.1rem .3rem;border-radius:3px;font-size:.6rem;margin-bottom:2px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.progress-bar{height:8px;background:var(--g200);border-radius:4px;overflow:hidden}
.progress-bar .fill{height:100%;border-radius:4px;transition:width .3s}
.fill-success{background:var(--success)}.fill-primary{background:var(--primary)}.fill-danger{background:var(--danger)}
.approver-item{display:flex;align-items:center;gap:.5rem;padding:.5rem 0;border-bottom:1px solid var(--border)}.approver-item:last-child{border-bottom:none}
.approver-status{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;color:#fff}
.approver-status.s-pending{background:var(--g400)}.approver-status.s-approved{background:var(--success)}.approver-status.s-rejected{background:var(--danger)}
.timeline{position:relative;padding-left:1.5rem}
.timeline::before{content:'';position:absolute;left:.5rem;top:0;bottom:0;width:2px;background:var(--border)}
.timeline-item{position:relative;margin-bottom:1rem;padding-left:.75rem}
.timeline-item::before{content:'';position:absolute;left:-1.25rem;top:.35rem;width:10px;height:10px;border-radius:50%;background:var(--primary);border:2px solid var(--bg-card)}
.timeline-item .tl-date{font-size:.7rem;color:var(--text-secondary)}.timeline-item .tl-text{font-size:.8125rem}
.comment-item{padding:.75rem 0;border-bottom:1px solid var(--border)}.comment-item:last-child{border-bottom:none}
.comment-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.25rem}
.comment-author{font-weight:600;font-size:.8125rem}.comment-date{font-size:.7rem;color:var(--text-secondary)}.comment-text{font-size:.8125rem;color:var(--text)}
.notif-item{display:flex;gap:.75rem;padding:.75rem 1rem;border-bottom:1px solid var(--border);cursor:pointer;transition:.15s}
.notif-item:hover{background:var(--g50)}.notif-item.unread{background:rgba(37,99,235,.03);border-left:3px solid var(--primary)}
.notif-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.875rem;flex-shrink:0}
.notif-icon.ni-approve{background:#d1fae5}.notif-icon.ni-reject{background:#fee2e2}.notif-icon.ni-comment{background:#dbeafe}.notif-icon.ni-default{background:var(--g200)}
.notif-body{flex:1}.notif-title{font-size:.8125rem;font-weight:600}.notif-msg{font-size:.75rem;color:var(--text-secondary);margin-top:.125rem}.notif-time{font-size:.7rem;color:var(--text-secondary);margin-top:.25rem}
.filter-bar{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1rem;align-items:center}
.filter-bar select,.filter-bar input{padding:.4rem .5rem;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-card);color:var(--text);font-size:.8rem}
.bulk-bar{display:flex;align-items:center;gap:.5rem;margin-bottom:.75rem;padding:.5rem .75rem;background:var(--primary);color:#fff;border-radius:var(--radius);font-size:.8125rem}
.bulk-bar button{background:rgba(255,255,255,.2);border:none;color:#fff;padding:.3rem .625rem;border-radius:var(--radius-sm);font-size:.75rem;font-weight:600;cursor:pointer}
.drop-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:2rem;text-align:center;color:var(--text-secondary);font-size:.8125rem;cursor:pointer;transition:.2s}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--primary);background:rgba(37,99,235,.03)}
.drop-zone input{display:none}
.templates-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem}
.template-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;cursor:pointer;transition:.2s;text-align:center}
.template-card:hover{border-color:var(--primary);box-shadow:var(--shadow)}
.template-card .tc-icon{font-size:2rem;margin-bottom:.5rem}.template-card .tc-name{font-weight:600;font-size:.875rem}.template-card .tc-desc{font-size:.75rem;color:var(--text-secondary);margin-top:.25rem}
.dept-group{margin-bottom:1rem}
.dept-header{display:flex;align-items:center;gap:.5rem;padding:.75rem 1rem;background:var(--g100);border-radius:var(--radius);cursor:pointer;font-weight:600;font-size:.875rem}
.dept-header .arrow{transition:.2s;display:inline-block}.dept-header.open .arrow{transform:rotate(90deg)}
.dept-body{padding:.5rem 0}
.bar-chart{display:flex;align-items:flex-end;gap:.5rem;height:200px;padding:.5rem 0}
.bar-item{flex:1;display:flex;flex-direction:column;align-items:center}
.bar-fill{width:100%;max-width:50px;border-radius:var(--radius-sm) var(--radius-sm) 0 0;transition:height .3s}
.bar-label{font-size:.6rem;color:var(--text-secondary);margin-top:.25rem;text-align:center;word-break:break-all}
.bar-value{font-size:.65rem;font-weight:600;margin-bottom:.125rem}
.pie-chart{width:180px;height:180px;border-radius:50%;margin:0 auto}
.pie-legend{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;margin-top:.75rem}
.pie-legend-item{display:flex;align-items:center;gap:.25rem;font-size:.7rem}
.pie-legend-item .dot{width:10px;height:10px;border-radius:50%}
.doc-detail{display:grid;grid-template-columns:1fr 340px;gap:1.5rem}
.doc-main{min-width:0}.doc-sidebar-panel{display:flex;flex-direction:column;gap:1rem}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem .75rem;font-size:.8125rem;margin-bottom:1rem}
.info-grid .info-label{color:var(--text-secondary);font-weight:500}.info-grid .info-value{font-weight:600}
.content-block{background:var(--g50);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin:1rem 0;white-space:pre-wrap;font-size:.875rem;line-height:1.6}
.tags-toggle{display:flex;flex-wrap:wrap;gap:.375rem}
.tags-toggle label{cursor:pointer}.tags-toggle input{display:none}
.tags-toggle .tag-opt{padding:.25rem .5rem;border:1px solid var(--border);border-radius:9px;font-size:.75rem;font-weight:500;transition:.15s;display:inline-block}
.tags-toggle input:checked+.tag-opt{border-color:var(--primary);background:rgba(37,99,235,.1);color:var(--primary)}
.approvers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:.375rem}
.approver-check{display:flex;align-items:center;gap:.375rem;font-size:.8125rem;padding:.375rem;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer}.approver-check:hover{background:var(--g50)}
.route-item{display:flex;align-items:center;justify-content:space-between;padding:.5rem .75rem;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:.375rem;font-size:.8125rem}
@media print{.sidebar,.top-bar,.burger,.toast-container,.modal-overlay,.bulk-bar,.filter-bar{display:none!important}.main-content{margin-left:0!important}.page-content{padding:0!important}body{background:#fff}}
@media(max-width:1024px){.doc-detail{grid-template-columns:1fr}.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}}
@media(max-width:768px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main-content{margin-left:0}.burger{display:block}.kanban-col{flex:0 0 240px}}
/* Wizard */
.wizard-steps{display:flex;gap:0;margin-bottom:1.5rem;position:relative}
.wizard-step{flex:1;text-align:center;padding:.75rem .5rem;font-size:.8125rem;font-weight:600;color:var(--text-secondary);position:relative;cursor:default}
.wizard-step .ws-num{width:28px;height:28px;border-radius:50%;background:var(--g200);color:var(--text-secondary);display:inline-flex;align-items:center;justify-content:center;font-size:.75rem;margin-bottom:.25rem;transition:.2s}
.wizard-step.active .ws-num{background:var(--primary);color:#fff}
.wizard-step.done .ws-num{background:var(--success);color:#fff}
.wizard-step.active{color:var(--primary)}
.wizard-step.done{color:var(--success)}
.wizard-step::after{content:'';position:absolute;top:18px;left:calc(50% + 20px);width:calc(100% - 40px);height:2px;background:var(--g200)}
.wizard-step:last-child::after{display:none}
.wizard-step.done::after{background:var(--success)}
.wizard-panel{display:none}
.wizard-panel.active{display:block}
/* Profile status */
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.status-available{background:#16a34a}.status-away{background:#d97706}.status-vacation{background:#6366f1}
/* Theme transition */
*{transition:background-color .2s,color .15s,border-color .15s}
/* Reject modal */
.reject-modal-body textarea{width:100%;min-height:80px;padding:.625rem;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);resize:vertical;font-size:.875rem}
/* AI Chat Widget */
.ai-fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(99,102,241,.4);display:flex;align-items:center;justify-content:center;font-size:1.5rem;z-index:1000;transition:transform .2s}
.ai-fab:hover{transform:scale(1.1)}
.ai-panel{position:fixed;bottom:90px;right:24px;width:400px;max-height:520px;background:var(--bg);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.15);z-index:1001;display:none;flex-direction:column;overflow:hidden}
.ai-panel.open{display:flex}
.ai-header{padding:.75rem 1rem;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;display:flex;align-items:center;justify-content:space-between;font-weight:600;font-size:.875rem}
.ai-header button{background:none;border:none;color:#fff;cursor:pointer;font-size:1.1rem}
.ai-body{flex:1;overflow-y:auto;padding:.75rem;display:flex;flex-direction:column;gap:.5rem;min-height:250px;max-height:350px}
.ai-msg{padding:.5rem .75rem;border-radius:10px;font-size:.8125rem;line-height:1.5;max-width:85%;word-wrap:break-word;white-space:pre-wrap}
.ai-msg.user{background:var(--primary);color:#fff;align-self:flex-end;border-bottom-right-radius:3px}
.ai-msg.assistant{background:var(--g100);color:var(--text);align-self:flex-start;border-bottom-left-radius:3px}
.ai-msg.system{background:transparent;color:var(--text-secondary);align-self:center;font-size:.75rem;font-style:italic}
.ai-footer{padding:.5rem;border-top:1px solid var(--border);display:flex;gap:.375rem}
.ai-footer input{flex:1;padding:.5rem .75rem;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:.8125rem}
.ai-footer button{padding:.5rem .75rem;border:none;border-radius:8px;background:var(--primary);color:#fff;cursor:pointer;font-size:.8125rem;white-space:nowrap}
.ai-footer button:disabled{opacity:.5;cursor:not-allowed}
.ai-actions{padding:.375rem .75rem;display:flex;gap:.25rem;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.ai-actions button{padding:.25rem .5rem;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);cursor:pointer;font-size:.7rem;transition:background .15s}
.ai-actions button:hover{background:var(--g100)}
.ai-typing{display:flex;gap:4px;padding:8px 12px;align-self:flex-start}
.ai-typing span{width:6px;height:6px;border-radius:50%;background:var(--text-secondary);animation:aiBounce .6s infinite alternate}
.ai-typing span:nth-child(2){animation-delay:.2s}
.ai-typing span:nth-child(3){animation-delay:.4s}
@keyframes aiBounce{to{transform:translateY(-6px);opacity:.4}}
@media(max-width:480px){.ai-panel{width:calc(100vw - 16px);right:8px;bottom:80px}}

var TAG_COLORS=['tag-red','tag-blue','tag-green','tag-yellow','tag-purple','tag-pink'];

function esc(s){if(s===null||s===undefined)return'';var d=document.createElement('div');d.appendChild(document.createTextNode(String(s)));return d.innerHTML}
function formatDate(s){if(!s)return'\u2014';var d=new Date(s);if(isNaN(d.getTime()))return'\u2014';return d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'})}
function formatDateTime(s){if(!s)return'\u2014';var d=new Date(s);if(isNaN(d.getTime()))return'\u2014';return d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})}
function timeAgo(s){if(!s)return'';var d=new Date(s);var diff=(Date.now()-d.getTime())/1000;if(diff<60)return'только что';if(diff<3600)return Math.floor(diff/60)+' мин. назад';if(diff<86400)return Math.floor(diff/3600)+' ч. назад';if(diff<2592000)return Math.floor(diff/86400)+' дн. назад';return formatDate(s)}
function toast(msg,type){type=type||'info';var c=document.getElementById('toastContainer');var t=document.createElement('div');t.className='toast toast-'+type;t.textContent=msg;c.appendChild(t);setTimeout(function(){t.style.animation='slideOut .3s ease-in forwards';setTimeout(function(){t.remove()},300)},3000)}
function toggleFav(id){var idx=favorites.indexOf(id);if(idx>=0)favorites.splice(idx,1);else favorites.push(id);localStorage.setItem('edo-fav',JSON.stringify(favorites))}
function isFav(id){return favorites.indexOf(id)>=0}
function statusBadge(st){return'<span class="badge badge-'+esc(st)+'">'+esc(STATUSES[st]||st)+'</span>'}
function priorityBadge(p){return p?'<span class="badge badge-'+esc(p)+'">'+esc(PRIORITIES[p]||p)+'</span>':''}
function tagSpan(t){var cc=t.color&&TAG_COLORS.indexOf('tag-'+t.color)>=0?'tag-'+t.color:TAG_COLORS[t.id%TAG_COLORS.length];return'<span class="tag '+cc+'">'+esc(t.name)+'</span>'}
function getApprovalProgress(doc){if(!doc.approvals||doc.approvals.length===0)return{pct:0,approved:0,total:0,rejected:0};var total=doc.approvals.length;var approved=doc.approvals.filter(function(a){return a.status==='approved'}).length;var rejected=doc.approvals.filter(function(a){return a.status==='rejected'}).length;return{pct:Math.round((approved/total)*100),approved:approved,total:total,rejected:rejected}}
function canUserApprove(doc){if(!currentUser||doc.status!=='pending')return false;var my=null;if(doc.approvals){for(var i=0;i<doc.approvals.length;i++){var a=doc.approvals[i];if(a.status==='pending'){if(a.user_id===currentUser.id){my=a;break}var approver=allUsers.find(function(u){return u.id===a.user_id});if(approver&&approver.deputy_id===currentUser.id){my=a;break}}}}if(!my)return false;if(doc.sequential&&doc.approvals){for(var j=0;j<doc.approvals.length;j++){if(doc.approvals[j].order_num<my.order_num&&doc.approvals[j].status==='pending')return false}}return true}

async function api(path,opts){opts=opts||{};var token=localStorage.getItem('edo-token');var headers={};if(token)headers['Authorization']='Bearer '+token;if(opts.body&&!(opts.body instanceof FormData)){headers['Content-Type']='application/json';opts.body=JSON.stringify(opts.body)}var resp=await fetch(API_BASE+path,Object.assign({},opts,{headers:Object.assign({},headers,opts.headers||{})}));if(resp.status===401){doLogout();throw new Error('Unauthorized')}if(!resp.ok){var msg='\u041e\u0448\u0438\u0431\u043a\u0430 \u0441\u0435\u0440\u0432\u0435\u0440\u0430';try{var e=await resp.json();msg=e.detail||msg}catch(ex){}throw new Error(msg)}if(resp.status===204)return null;return resp.json()}

function showAuthTab(tab){document.getElementById('loginForm').classList.toggle('hidden',tab!=='login');document.getElementById('registerForm').classList.toggle('hidden',tab!=='register');var tabs=document.querySelectorAll('.auth-tabs button');tabs[0].classList.toggle('active',tab==='login');tabs[1].classList.toggle('active',tab==='register');document.getElementById('authError').classList.add('hidden')}

async function doLogin(e){e.preventDefault();var errEl=document.getElementById('authError');errEl.classList.add('hidden');try{var data=await api('/api/login',{method:'POST',body:{login:document.getElementById('loginLogin').value,password:document.getElementById('loginPass').value}});localStorage.setItem('edo-token',data.access_token);currentUser=data.user;enterApp()}catch(err){errEl.textContent=err.message;errEl.classList.remove('hidden')}return false}

async function doRegister(e){e.preventDefault();var errEl=document.getElementById('authError');errEl.classList.add('hidden');try{var data=await api('/api/register',{method:'POST',body:{login:document.getElementById('regLogin').value,name:document.getElementById('regName').value,password:document.getElementById('regPass').value,department:document.getElementById('regDept').value||'',position:document.getElementById('regPos').value||''}});localStorage.setItem('edo-token',data.access_token);currentUser=data.user;enterApp()}catch(err){errEl.textContent=err.message;errEl.classList.remove('hidden')}return false}

function doLogout(){localStorage.removeItem('edo-token');currentUser=null;documents=[];allUsers=[];allTags=[];notifications=[];allRoutes=[];document.getElementById('authPage').classList.remove('hidden');document.getElementById('appWrap').classList.add('hidden');document.getElementById('aiFab').style.display='none';document.getElementById('aiPanel').classList.remove('open');aiHistory=[];aiCurrentDocId=null}

async function enterApp(){document.getElementById('authPage').classList.add('hidden');document.getElementById('appWrap').classList.remove('hidden');document.getElementById('aiFab').style.display='flex';updateUserUI();await Promise.all([loadDocs(),loadUsers(),loadTags(),loadNotifs(),loadRoutes(),loadTasks(),loadServerTemplates()]);showPage('dashboard')}

function updateUserUI(){if(!currentUser)return;document.getElementById('userName').textContent=currentUser.name;var statusMap={available:'Доступен',away:'Не в офисе',vacation:'В отпуске'};document.getElementById('userRole').innerHTML=(currentUser.role==='admin'?'Администратор':'Сотрудник')+' <span class="status-dot status-'+(currentUser.user_status||'available')+'" style="margin-left:4px"></span>';var av=document.getElementById('userAvatar');av.textContent=currentUser.name.charAt(0).toUpperCase();av.style.background=currentUser.color||'#2563eb';document.querySelectorAll('.admin-only').forEach(function(el){el.classList.toggle('hidden',currentUser.role!=='admin')});var isBuh=currentUser.role==='admin'||currentUser.department==='Бухгалтерия';document.querySelectorAll('.buh-only').forEach(function(el){el.classList.toggle('hidden',!isBuh)})}

async function loadDocs(){try{documents=await api('/api/documents')}catch(e){documents=[]}}
async function loadUsers(){try{allUsers=await api('/api/users')}catch(e){allUsers=[]}}
async function loadTags(){try{allTags=await api('/api/tags')}catch(e){allTags=[]}}
async function loadNotifs(){try{notifications=await api('/api/notifications');var unread=notifications.filter(function(n){return!n.read}).length;var badge=document.getElementById('notifBadge');if(unread>0){badge.textContent=unread;badge.classList.remove('hidden')}else{badge.classList.add('hidden')}}catch(e){notifications=[]}updateApprovalBadge()}
async function loadRoutes(){try{allRoutes=await api('/api/routes')}catch(e){allRoutes=[]}}
async function loadTasks(){try{allTasks=await api('/api/tasks');var myPending=allTasks.filter(function(t){return t.assignee_id===currentUser.id&&(t.status==='pending'||t.status==='in_progress')}).length;var badge=document.getElementById('taskBadge');if(myPending>0){badge.textContent=myPending;badge.classList.remove('hidden')}else{badge.classList.add('hidden')}}catch(e){allTasks=[]}}
async function loadTrash(){try{trashDocs=await api('/api/documents/trash')}catch(e){trashDocs=[]}}
function updateApprovalBadge(){var count=documents.filter(function(d){return canUserApprove(d)}).length;var badge=document.getElementById('approvalBadge');if(count>0){badge.textContent=count;badge.classList.remove('hidden')}else{badge.classList.add('hidden')}}

var _searchTimer=null;
function onGlobalSearch(val){
  if(currentPage==='documents'){var si=document.getElementById('filterSearch');if(si){si.value=val;renderDocTable()}}
  clearTimeout(_searchTimer);
  var dd=document.getElementById('searchDropdown');
  if(!val||val.length<2){if(dd)dd.remove();return}
  _searchTimer=setTimeout(async function(){
    try{
      var res=await api('/api/documents/search?q='+encodeURIComponent(val));
      var items=res.results||[];
      if(dd)dd.remove();
      if(items.length===0)return;
      var drop=document.createElement('div');drop.id='searchDropdown';
      drop.style.cssText='position:absolute;top:100%;left:0;right:0;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-lg);max-height:300px;overflow-y:auto;z-index:60';
      items.slice(0,8).forEach(function(d){
        var it=document.createElement('div');
        it.style.cssText='padding:.5rem .75rem;border-bottom:1px solid var(--border);cursor:pointer;font-size:.8125rem';
        it.innerHTML='<div style="font-weight:600">'+esc(d.title)+'</div><div style="font-size:.7rem;color:var(--text-secondary)">'+esc(d.number)+' &middot; '+esc(DOC_TYPES[d.doc_type]||d.doc_type)+' &middot; '+esc(STATUSES[d.status]||d.status)+'</div>';
        it.onmousedown=function(e){e.preventDefault();showPage('detail',d.id);drop.remove();document.getElementById('globalSearch').value=''};
        drop.appendChild(it)
      });
      document.querySelector('.top-search').appendChild(drop)
    }catch(e){}
  },300)
}

  var so=Object.keys(STATUSES).map(function(k){return'<option value="'+k+'">'+esc(STATUSES[k])+'</option>'}).join('');
  var to=Object.keys(DOC_TYPES).map(function(k){return'<option value="'+k+'">'+esc(DOC_TYPES[k])+'</option>'}).join('');

  renderDocTable()

function renderDocTable(){
  var filtered=documents.slice();var stE=document.getElementById('filterStatus'),tpE=document.getElementById('filterType'),tgE=document.getElementById('filterTag'),sqE=document.getElementById('filterSearch');
  var st=stE?stE.value:'',tp=tpE?tpE.value:'',tg=tgE?tgE.value:'',sq=sqE?sqE.value.toLowerCase():'';
  if(st)filtered=filtered.filter(function(d){return d.status===st});
  if(tp)filtered=filtered.filter(function(d){return d.doc_type===tp});
  if(tg)filtered=filtered.filter(function(d){return d.tags&&d.tags.some(function(t){return t.id===parseInt(tg)})});
  if(sq)filtered=filtered.filter(function(d){var ef=d.extra_fields||{};var efStr=Object.values(ef).join(' ').toLowerCase();return(d.title||'').toLowerCase().indexOf(sq)>=0||(d.number||'').toLowerCase().indexOf(sq)>=0||(d.author_name||'').toLowerCase().indexOf(sq)>=0||(d.description||'').toLowerCase().indexOf(sq)>=0||(d.content||'').toLowerCase().indexOf(sq)>=0||efStr.indexOf(sq)>=0});
  if(sortCol){filtered.sort(function(a,b){var va=a[sortCol],vb=b[sortCol];if(sortCol==='title'||sortCol==='author_name'||sortCol==='status'||sortCol==='doc_type')return((va||'').localeCompare(vb||''))*sortDir;if(sortCol==='deadline'||sortCol==='created_at')return((new Date(va||0))-(new Date(vb||0)))*sortDir;return 0})}
  function arrow(col){return sortCol===col?(sortDir===1?' &#9650;':' &#9660;'):''}
  var table=document.getElementById('docTable');if(!table)return;
  var rows=filtered.map(function(d){var isO=d.author_id===currentUser.id||currentUser.role==='admin';return'<tr><td><input type="checkbox" class="chk" '+(selectedIds.has(d.id)?'checked':'')+' onchange="toggleSelect('+d.id+',this.checked)"></td><td><button class="star-btn '+(isFav(d.id)?'active':'')+'" onclick="toggleFav('+d.id+');renderDocTable()">&#9733;</button></td><td>'+esc(d.number||d.id)+'</td><td><a href="#" onclick="event.preventDefault();showPage(\'detail\','+d.id+')" style="font-weight:600">'+esc(d.title)+'</a> '+(d.priority?priorityBadge(d.priority):'')+'</td><td>'+(d.tags||[]).map(function(t){return tagSpan(t)}).join('')+'</td><td>'+esc(DOC_TYPES[d.doc_type]||d.doc_type)+'</td><td>'+statusBadge(d.status)+'</td><td>'+esc(d.author_name||'')+'</td><td>'+(d.deadline?formatDate(d.deadline):'\u2014')+'</td><td style="white-space:nowrap"><button class="btn btn-outline btn-sm" onclick="showPage(\'detail\','+d.id+')" title="Просмотр">&#128065;</button>'+(isO?'<button class="btn btn-outline btn-sm" onclick="showPage(\'create\','+d.id+')" title="Редактировать">&#9998;</button>':'')+(isO?'<button class="btn btn-danger btn-sm" onclick="deleteDoc('+d.id+')" title="Удалить">&#128465;</button>':'')+'</td></tr>'}).join('');
  if(filtered.length===0)rows='<tr><td colspan="10" style="text-align:center;padding:2rem;color:var(--text-secondary)">Документы не найдены</td></tr>';
  table.innerHTML='<thead><tr><th style="width:30px"><input type="checkbox" class="chk" onchange="toggleAllSelect(this.checked)"></th><th style="width:30px"></th><th onclick="doSort(\'number\')">\u2116'+arrow('number')+'</th><th onclick="doSort(\'title\')">Название'+arrow('title')+'</th><th>Метки</th><th onclick="doSort(\'doc_type\')">Тип'+arrow('doc_type')+'</th><th onclick="doSort(\'status\')">Статус'+arrow('status')+'</th><th onclick="doSort(\'author_name\')">Автор'+arrow('author_name')+'</th><th onclick="doSort(\'deadline\')">Дедлайн'+arrow('deadline')+'</th><th>Действия</th></tr></thead><tbody>'+rows+'</tbody>';
  renderBulkBar()
}
function doSort(col){if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=1}renderDocTable()}
function toggleSelect(id,checked){if(checked)selectedIds.add(id);else selectedIds.delete(id);renderBulkBar()}

function exportCSV(){var csv='\uFEFF"\u2116","Название","Тип","Статус","Автор","Дедлайн","Создан"\n';documents.forEach(function(d){csv+='"'+(d.number||d.id)+'","'+((d.title||'').replace(/"/g,'""'))+'","'+(DOC_TYPES[d.doc_type]||d.doc_type)+'","'+(STATUSES[d.status]||d.status)+'","'+((d.author_name||'').replace(/"/g,'""'))+'","'+(d.deadline||'')+'","'+(d.created_at||'')+'"\n'});var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='documents.csv';a.click()}

function renderCreateEdit(el,docId){
  var doc=docId?documents.find(function(d){return d.id===docId}):null;var isEdit=!!doc;var title=isEdit?'Редактировать документ':'Новый документ';

  var tagsH=allTags.map(function(t){var ch=doc&&doc.tags&&doc.tags.some(function(dt){return dt.id===t.id})?'checked':'';return'<label><input type="checkbox" name="tag" value="'+t.id+'" '+ch+'><span class="tag-opt">'+esc(t.name)+'</span></label>'}).join('');

  var relO=documents.filter(function(d){return d.id!==docId}).map(function(d){var sel=doc&&doc.related_doc_ids&&doc.related_doc_ids.indexOf(d.id)>=0?'selected':'';return'<option value="'+d.id+'" '+sel+'>'+esc(d.number||d.id)+' - '+esc(d.title)+'</option>'}).join('');
  var appH=allUsers.filter(function(u){return u.id!==(currentUser?currentUser.id:0)}).map(function(u){var ch=doc&&doc.approvals&&doc.approvals.some(function(a){return a.user_id===u.id})?'checked':'';return'<label class="approver-check"><input type="checkbox" name="approver" value="'+u.id+'" '+ch+'> '+esc(u.name)+'</label>'}).join('');

async function addComment(e,docId){e.preventDefault();var text=document.getElementById('commentText').value.trim();if(!text)return false;try{await api('/api/documents/'+docId+'/comments',{method:'POST',body:{text:text}});toast('Комментарий добавлен','success');await loadDocs();showPage('detail',docId)}catch(err){toast(err.message,'error')}return false}
async function approveDoc(id){var comment=prompt('Комментарий (необязательно):')||'';try{await api('/api/documents/'+id+'/approve',{method:'POST',body:{comment:comment}});toast('Документ согласован','success');await loadDocs();await loadNotifs();showPage('detail',id)}catch(e){toast(e.message,'error')}}
function rejectDoc(id){
  var ov=document.createElement('div');ov.className='modal-overlay';ov.onclick=function(e){if(e.target===ov)ov.remove()};
  ov.innerHTML='<div class="modal-card"><div class="modal-header"><h3>Отклонение документа</h3><button class="modal-close" onclick="this.closest(\'.modal-overlay\').remove()">&times;</button></div><div class="modal-body reject-modal-body"><p style="font-size:.8125rem;color:var(--text-secondary);margin-bottom:.75rem">Укажите причину отклонения (обязательно):</p><textarea id="rejectReason" placeholder="Причина отклонения..." autofocus></textarea></div><div class="modal-footer"><button class="btn btn-outline" onclick="this.closest(\'.modal-overlay\').remove()">Отмена</button><button class="btn btn-danger" onclick="submitReject('+id+')">Отклонить</button></div></div>';
  document.body.appendChild(ov);setTimeout(function(){var ta=document.getElementById('rejectReason');if(ta)ta.focus()},100)
}
async function submitReject(id){var ta=document.getElementById('rejectReason');var comment=ta?ta.value.trim():'';if(!comment){toast('Укажите причину отклонения','warning');return}var ov=ta.closest('.modal-overlay');try{await api('/api/documents/'+id+'/reject',{method:'POST',body:{comment:comment}});if(ov)ov.remove();toast('Документ отклонён','warning');await loadDocs();await loadNotifs();showPage('detail',id)}catch(e){toast(e.message,'error')}}
async function saveDocAsTemplate(docId){var doc=documents.find(function(d){return d.id===docId});if(!doc)return;var name=prompt('Название шаблона:',doc.title);if(!name)return;try{await api('/api/templates',{method:'POST',body:{name:name,doc_type:doc.doc_type,title_template:doc.title,description_template:doc.description||'',content_template:doc.content||'',extra_fields_template:doc.extra_fields||{},priority:doc.priority,is_public:true}});toast('Шаблон сохранён','success');await loadServerTemplates()}catch(e){toast(e.message,'error')}}
async function delegateDoc(id){var others=allUsers.filter(function(u){return u.id!==currentUser.id});var names=others.map(function(u,i){return(i+1)+'. '+u.name}).join('\n');var choice=prompt('Делегировать кому? Введите номер:\n'+names);if(!choice)return;var idx=parseInt(choice)-1;if(isNaN(idx)||idx<0||idx>=others.length){toast('Неверный выбор','error');return}try{await api('/api/documents/'+id+'/delegate?to_user_id='+others[idx].id,{method:'POST'});toast('Документ делегирован','success');await loadDocs();await loadNotifs();showPage('detail',id)}catch(e){toast(e.message,'error')}}
async function recallDoc(id){if(!confirm('Отозвать документ?'))return;try{await api('/api/documents/'+id+'/recall',{method:'POST'});toast('Документ отозван','info');await loadDocs();await loadNotifs();showPage('detail',id)}catch(e){toast(e.message,'error')}}
async function resendDoc(id){try{await api('/api/documents/'+id+'/resend',{method:'POST'});toast('Документ переотправлен','info');await loadDocs();await loadNotifs();showPage('detail',id)}catch(e){toast(e.message,'error')}}
async function archiveDoc(id){if(!confirm('Архивировать документ?'))return;try{await api('/api/documents/'+id+'/archive',{method:'POST'});toast('Документ архивирован','info');await loadDocs();await loadNotifs();showPage('detail',id)}catch(e){toast(e.message,'error')}}
async function copyDoc(id){try{var d=await api('/api/documents/'+id+'/copy',{method:'POST'});toast('\u041a\u043e\u043f\u0438\u044f \u0441\u043e\u0437\u0434\u0430\u043d\u0430','success');await loadDocs();showPage('detail',d.id)}catch(e){toast(e.message,'error')}}
async function createResolution(id){var text=prompt('Текст резолюции:');if(!text)return;try{await api('/api/documents/'+id+'/resolution',{method:'POST',body:{text:text}});toast('Резолюция создана','success');await loadDocs();await loadNotifs();showPage('detail',id)}catch(e){toast(e.message,'error')}}
function uploadToDoc(docId){var inp=document.createElement('input');inp.type='file';inp.multiple=true;inp.onchange=async function(){var files=inp.files;if(!files.length)return;for(var i=0;i<files.length;i++){var fd=new FormData();fd.append('file',files[i]);try{await api('/api/documents/'+docId+'/upload',{method:'POST',body:fd});toast('\u0424\u0430\u0439\u043b \u0437\u0430\u0433\u0440\u0443\u0436\u0435\u043d: '+files[i].name,'success')}catch(e){toast(e.message,'error')}}await loadDocs();showPage('detail',docId)};inp.click()}

function importDocFile(){var inp=document.createElement('input');inp.type='file';inp.accept='.pdf,.docx';inp.onchange=async function(){var file=inp.files[0];if(!file)return;var ext=file.name.split('.').pop().toLowerCase();if(ext!=='pdf'&&ext!=='docx'){toast('Поддерживаются только PDF и DOCX','error');return}var fd=new FormData();fd.append('file',file);fd.append('doc_type','other');try{toast('Загрузка и обработка файла...','info');var doc=await api('/api/documents/import',{method:'POST',body:fd});toast('Документ создан из '+file.name,'success');await loadDocs();showPage('detail',doc.id)}catch(e){toast(e.message||'Ошибка импорта','error')}};inp.click()}

function exportDoc(docId,fmt){var token=localStorage.getItem('edo-token');var url=API_BASE+'/api/documents/'+docId+'/export/'+fmt;fetch(url,{headers:{'Authorization':'Bearer '+token}}).then(function(r){if(!r.ok)throw new Error('Ошибка экспорта');return r.blob()}).then(function(blob){var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='document.'+fmt;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(a.href);toast('Файл скачан','success')}).catch(function(e){toast(e.message,'error')})}

function renderCalendar(el){
  var now=new Date();if(calYear===undefined){calYear=now.getFullYear();calMonth=now.getMonth()}
  var mn=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  var dn=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  var fd=new Date(calYear,calMonth,1);var sd=fd.getDay();sd=sd===0?6:sd-1;
  var dim=new Date(calYear,calMonth+1,0).getDate(),dip=new Date(calYear,calMonth,0).getDate();
  var ts=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  var cells=[];for(var ii=sd-1;ii>=0;ii--){var pd=dip-ii,pm=calMonth===0?11:calMonth-1,py=calMonth===0?calYear-1:calYear;cells.push({day:pd,month:pm,year:py,other:true})}
  for(var dd=1;dd<=dim;dd++)cells.push({day:dd,month:calMonth,year:calYear,other:false});
  var rem=42-cells.length;for(var nd=1;nd<=rem;nd++){var nm=calMonth===11?0:calMonth+1,ny=calMonth===11?calYear+1:calYear;cells.push({day:nd,month:nm,year:ny,other:true})}
  var dbd={};documents.forEach(function(doc){if(doc.deadline){var ds=doc.deadline.slice(0,10);if(!dbd[ds])dbd[ds]=[];dbd[ds].push(doc)}});
  var pM=calMonth===0?11:calMonth-1,pY=calMonth===0?calYear-1:calYear,nM=calMonth===11?0:calMonth+1,nY=calMonth===11?calYear+1:calYear;
  var ch=cells.map(function(c){var ds=c.year+'-'+String(c.month+1).padStart(2,'0')+'-'+String(c.day).padStart(2,'0');var it=ds===ts;var docs=dbd[ds]||[];var dh=docs.slice(0,3).map(function(dc){return'<div class="cal-doc" onclick="showPage(\'detail\','+dc.id+')" title="'+esc(dc.title)+'">'+esc(dc.title)+'</div>'}).join('');if(docs.length>3)dh+='<div style="font-size:.6rem;color:var(--text-secondary)">+'+(docs.length-3)+'</div>';return'<div class="cal-day '+(c.other?'other-month':'')+' '+(it?'today':'')+'"><div class="day-num">'+c.day+'</div>'+dh+'</div>'}).join('');

function renderAnalytics(el){
  var total=documents.length;var overdue=documents.filter(function(d){return d.deadline&&d.status!=='archived'&&d.status!=='approved'&&new Date(d.deadline)<new Date()});
  var tam=0,ac=0;documents.forEach(function(d){if(d.status==='approved'&&d.created_at&&d.updated_at){tam+=new Date(d.updated_at)-new Date(d.created_at);ac++}});
  var avgD=ac>0?(tam/ac/86400000).toFixed(1):'\u2014';
  var actC=0;documents.forEach(function(d){actC+=(d.comments||[]).length+(d.approvals||[]).length});
  var mc={};documents.forEach(function(d){if(d.created_at){var dt=new Date(d.created_at);var key=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0');mc[key]=(mc[key]||0)+1}});
  var sm=Object.entries(mc).sort(function(a,b){return a[0].localeCompare(b[0])}).slice(-12);var mv=sm.map(function(e){return e[1]});var mmc=mv.length>0?Math.max.apply(null,mv):1;
  var mbh=sm.map(function(e){return'<div class="bar-item"><div class="bar-value">'+e[1]+'</div><div class="bar-fill" style="height:'+((e[1]/mmc)*160)+'px;background:var(--primary)"></div><div class="bar-label">'+e[0]+'</div></div>'}).join('');
  if(sm.length===0)mbh='<div style="text-align:center;color:var(--text-secondary);width:100%;padding:2rem">Нет данных</div>';
  var aw={};documents.forEach(function(d){(d.approvals||[]).forEach(function(a){if(!aw[a.user_name])aw[a.user_name]={total:0,approved:0,rejected:0,pending:0};aw[a.user_name].total++;if(aw[a.user_name][a.status]!==undefined)aw[a.user_name][a.status]++})});
  var wr=Object.keys(aw).map(function(n){var w=aw[n];return'<tr><td>'+esc(n)+'</td><td>'+w.total+'</td><td>'+w.approved+'</td><td>'+w.rejected+'</td><td>'+w.pending+'</td></tr>'}).join('');
  if(Object.keys(aw).length===0)wr='<tr><td colspan="5" style="text-align:center;color:var(--text-secondary)">Нет данных</td></tr>';
  var or=overdue.map(function(d){return'<tr style="cursor:pointer" onclick="showPage(\'detail\','+d.id+')"><td>'+esc(d.title)+'</td><td style="color:var(--danger)">'+formatDate(d.deadline)+'</td><td>'+statusBadge(d.status)+'</td></tr>'}).join('');
  if(overdue.length===0)or='<tr><td colspan="3" style="text-align:center;color:var(--text-secondary)">Нет просроченных</td></tr>';
  el.innerHTML='<h2 class="page-title">Аналитика</h2><div class="stats-grid"><div class="stat-card primary"><div class="stat-label">Среднее время согласования</div><div class="stat-value">'+avgD+'</div><div class="stat-sub">дней</div></div><div class="stat-card success"><div class="stat-label">Всего документов</div><div class="stat-value">'+total+'</div><div class="stat-sub">в системе</div></div><div class="stat-card danger"><div class="stat-label">Просрочено</div><div class="stat-value">'+overdue.length+'</div><div class="stat-sub">документов</div></div><div class="stat-card info"><div class="stat-label">Действий</div><div class="stat-value">'+actC+'</div><div class="stat-sub">комментариев и решений</div></div></div><div class="card" style="margin-bottom:1.5rem"><div class="card-header">Документы по месяцам</div><div class="card-body"><div class="bar-chart">'+mbh+'</div></div></div><div class="grid-2"><div class="card"><div class="card-header">Нагрузка согласующих</div><div class="card-body" style="padding:0"><div class="table-wrap"><table><thead><tr><th>Сотрудник</th><th>Всего</th><th>Согласовано</th><th>Отклонено</th><th>Ожидание</th></tr></thead><tbody>'+wr+'</tbody></table></div></div></div><div class="card"><div class="card-header" style="color:var(--danger)">Просроченные документы ('+overdue.length+')</div><div class="card-body" style="padding:0"><div class="table-wrap"><table><thead><tr><th>Название</th><th>Дедлайн</th><th>Статус</th></tr></thead><tbody>'+or+'</tbody></table></div></div></div></div>'
}

function renderCorrTable(direction) {
  var types = direction === 'incoming' ? INCOMING_TYPES : OUTGOING_TYPES;
  var filtered = documents.filter(function(d) { return types.indexOf(d.doc_type) >= 0 });
  var tpE = document.getElementById('corrFilterType'), stE = document.getElementById('corrFilterStatus'),
      sqE = document.getElementById('corrFilterSearch'), dfE = document.getElementById('corrFilterDateFrom'),
      dtE = document.getElementById('corrFilterDateTo');
  var tp = tpE ? tpE.value : '', st = stE ? stE.value : '', sq = sqE ? sqE.value.toLowerCase() : '',
      df = dfE ? dfE.value : '', dt = dtE ? dtE.value : '';
  if (tp) filtered = filtered.filter(function(d) { return d.doc_type === tp });
  if (st) filtered = filtered.filter(function(d) { return d.status === st });
  if (sq) filtered = filtered.filter(function(d) {
    var ef = d.extra_fields || {};
    var counterparty = ef.sender || ef.supplier || ef.seller || ef.counterparty || ef.recipient || ef.receiver || ef.buyer || '';
    var regNum = ef.incoming_number || ef.outgoing_number || '';
    return (d.title || '').toLowerCase().indexOf(sq) >= 0 || (d.number || '').toLowerCase().indexOf(sq) >= 0 ||
           (d.author_name || '').toLowerCase().indexOf(sq) >= 0 || counterparty.toLowerCase().indexOf(sq) >= 0 ||
           regNum.toLowerCase().indexOf(sq) >= 0
  });
  if (df) filtered = filtered.filter(function(d) { return (d.created_at || '') >= df });
  if (dt) filtered = filtered.filter(function(d) { return (d.created_at || '').slice(0, 10) <= dt });

  filtered.sort(function(a, b) { return new Date(b.created_at || 0) - new Date(a.created_at || 0) });

  var isIncoming = direction === 'incoming';
  var table = document.getElementById('corrTable');
  if (!table) return;

  var rows = filtered.map(function(d) {
    var ef = d.extra_fields || {};
    var counterparty = isIncoming ? (ef.sender || ef.supplier || ef.seller || ef.counterparty || '') : (ef.recipient || ef.receiver || ef.buyer || ef.counterparty || '');
    var regNum = isIncoming ? (ef.incoming_number || '') : (ef.outgoing_number || '');
    var regDate = isIncoming ? (ef.received_date || '') : (ef.send_date || '');
    var amount = ef.amount || ef.total_amount || ef.balance || '';
    var isO = d.author_id === currentUser.id || currentUser.role === 'admin';
    return '<tr>' +
      '<td>' + esc(d.number || d.id) + '</td>' +
      '<td>' + esc(regNum) + '</td>' +
      '<td><a href="#" onclick="event.preventDefault();showPage(\'detail\',' + d.id + ')" style="font-weight:600">' + esc(d.title) + '</a></td>' +
      '<td>' + esc(DOC_TYPES[d.doc_type] || d.doc_type) + '</td>' +
      '<td>' + esc(counterparty) + '</td>' +
      '<td>' + statusBadge(d.status) + '</td>' +
      '<td>' + (amount ? esc(String(amount)) : '\u2014') + '</td>' +
      '<td>' + (regDate ? formatDate(regDate) : formatDate(d.created_at)) + '</td>' +
      '<td style="white-space:nowrap">' +
      '<button class="btn btn-outline btn-sm" onclick="showPage(\'detail\',' + d.id + ')" title="Просмотр">&#128065;</button>' +
      (isO ? '<button class="btn btn-outline btn-sm" onclick="showPage(\'create\',' + d.id + ')" title="Редактировать">&#9998;</button>' : '') +
      (isO ? '<button class="btn btn-danger btn-sm" onclick="deleteDoc(' + d.id + ')" title="Удалить">&#128465;</button>' : '') +
      '</td></tr>'
  }).join('');
  if (filtered.length === 0) rows = '<tr><td colspan="9" style="text-align:center;padding:2rem;color:var(--text-secondary)">Документы не найдены</td></tr>';
  table.innerHTML = '<thead><tr>' +
    '<th>Рег. №</th>' +
    '<th>' + (isIncoming ? 'Вх. №' : 'Исх. №') + '</th>' +
    '<th>Название</th><th>Тип</th>' +
    '<th>' + (isIncoming ? 'Отправитель' : 'Получатель') + '</th>' +
    '<th>Статус</th><th>Сумма</th><th>Дата</th><th>Действия</th>' +
    '</tr></thead><tbody>' + rows + '</tbody>';
}

function uploadCorrespondencePDF(direction) {
  var isIncoming = direction === 'incoming';
  var types = isIncoming ? INCOMING_TYPES : OUTGOING_TYPES;
  var typeOptions = types.map(function(k) { return '<option value="' + k + '">' + esc(DOC_TYPES[k] || k) + '</option>' }).join('');
  var ov = document.createElement('div');
  ov.className = 'modal-overlay';
  ov.onclick = function(e) { if (e.target === ov) ov.remove() };
  ov.innerHTML = '<div class="modal-card"><div class="modal-header"><h3>' + (isIncoming ? 'Загрузить входящий PDF' : 'Загрузить исходящий PDF') + '</h3><button class="modal-close" onclick="this.closest(\'.modal-overlay\').remove()">&times;</button></div>' +
    '<div class="modal-body"><div class="form-group"><label>Тип документа</label><select id="corrUploadType" class="form-control">' + typeOptions + '</select></div>' +
    '<div class="form-group"><label>PDF файл</label><input type="file" id="corrUploadFile" accept=".pdf" class="form-control"></div></div>' +
    '<div class="modal-footer"><button class="btn btn-outline" onclick="this.closest(\'.modal-overlay\').remove()">Отмена</button>' +
    '<button class="btn btn-primary" id="corrUploadBtn">Загрузить</button></div></div>';
  document.body.appendChild(ov);
  document.getElementById('corrUploadBtn').onclick = async function() {
    var fileInput = document.getElementById('corrUploadFile');
    var typeSelect = document.getElementById('corrUploadType');
    if (!fileInput || !fileInput.files[0]) { toast('Выберите PDF файл', 'error'); return; }
    var file = fileInput.files[0];
    if (!file.name.toLowerCase().endsWith('.pdf')) { toast('Только PDF файлы', 'error'); return; }
    var fd = new FormData();
    fd.append('file', file);
    fd.append('direction', direction);
    fd.append('doc_type', typeSelect.value);
    try {
      toast('Загрузка и обработка...', 'info');
      ov.remove();
      var doc = await api('/api/documents/upload-correspondence', {method: 'POST', body: fd});
      toast('Документ №' + doc.number + ' создан из ' + file.name, 'success');
      await loadDocs();
      showPage('detail', doc.id);
    } catch(e) { toast(e.message || 'Ошибка загрузки', 'error'); }
  };
}

function exportCorrespondenceCSV(direction) {
  var types = direction === 'incoming' ? INCOMING_TYPES : OUTGOING_TYPES;
  var isIncoming = direction === 'incoming';
  var filtered = documents.filter(function(d) { return types.indexOf(d.doc_type) >= 0 });
  var csv = '\uFEFF"Рег. №","' + (isIncoming ? 'Вх. №' : 'Исх. №') + '","Название","Тип","' + (isIncoming ? 'Отправитель' : 'Получатель') + '","Статус","Сумма","Дата"\n';
  filtered.forEach(function(d) {
    var ef = d.extra_fields || {};
    var counterparty = isIncoming ? (ef.sender || ef.supplier || ef.seller || ef.counterparty || '') : (ef.recipient || ef.receiver || ef.buyer || ef.counterparty || '');
    var regNum = isIncoming ? (ef.incoming_number || '') : (ef.outgoing_number || '');
    var amount = ef.amount || ef.total_amount || '';
    csv += '"' + (d.number || d.id) + '","' + regNum + '","' + ((d.title || '').replace(/"/g, '""')) + '","' + (DOC_TYPES[d.doc_type] || d.doc_type) + '","' + counterparty.replace(/"/g, '""') + '","' + (STATUSES[d.status] || d.status) + '","' + amount + '","' + (d.created_at || '') + '"\n';
  });
  var blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = direction + '_documents.csv';
  a.click();
}

var aiHistory=[];
var aiCurrentDocId=null;

function toggleAI(){
  var p=document.getElementById('aiPanel');
  p.classList.toggle('open');
  if(p.classList.contains('open')&&aiHistory.length===0){
    aiAddMsg('system','ИИ-помощник ЭДО. Задайте вопрос, попросите суммаризировать документ или сгенерировать текст.');
  }
}

function aiAddMsg(role,text){
  aiHistory.push({role:role,content:text});
  aiRender();
}

function aiRender(){
  var body=document.getElementById('aiBody');
  body.innerHTML=aiHistory.map(function(m){
    return '<div class="ai-msg '+m.role+'">'+esc(m.content)+'</div>';
  }).join('');
  body.scrollTop=body.scrollHeight;
}

function aiShowTyping(){
  var body=document.getElementById('aiBody');
  body.innerHTML+=('<div class="ai-typing" id="aiTyping"><span></span><span></span><span></span></div>');
  body.scrollTop=body.scrollHeight;
}

function aiHideTyping(){
  var t=document.getElementById('aiTyping');
  if(t)t.remove();
}

async function aiSend(){
  var inp=document.getElementById('aiInput');
  var msg=inp.value.trim();
  if(!msg)return;
  inp.value='';
  aiAddMsg('user',msg);
  aiShowTyping();
  var sendBtn=document.getElementById('aiSendBtn');
  sendBtn.disabled=true;
  try{
    var chatHistory=aiHistory.filter(function(m){return m.role==='user'||m.role==='assistant'});
    var res=await api('/api/ai/chat',{method:'POST',body:{message:msg,doc_id:aiCurrentDocId,history:chatHistory.slice(-10)}});
    aiHideTyping();
    aiAddMsg('assistant',res.reply);
    if(res.action){aiExecuteAction(res.action,res.fill)}else if(res.fill){aiExecuteAction({page:'create'},res.fill)}
  }catch(e){
    aiHideTyping();
    aiAddMsg('system','Ошибка: '+(e.message||'Не удалось получить ответ'));
  }
  sendBtn.disabled=false;
  inp.focus();
}

async function aiSummarize(){
  if(!aiCurrentDocId){toast('Откройте документ для суммаризации','error');return}
  aiAddMsg('user','Суммаризируй текущий документ');
  aiShowTyping();
  try{
    var res=await api('/api/ai/summarize',{method:'POST',body:{doc_id:aiCurrentDocId}});
    aiHideTyping();
    aiAddMsg('assistant',res.summary);
  }catch(e){
    aiHideTyping();
    aiAddMsg('system','Ошибка: '+(e.message||'Не удалось суммаризировать'));
  }
}

async function aiGenerate(){
  var prompt=window.prompt('Опишите какой документ нужно сгенерировать:');
  if(!prompt)return;
  aiAddMsg('user','Сгенерируй: '+prompt);
  aiShowTyping();
  try{
    var res=await api('/api/ai/generate',{method:'POST',body:{prompt:prompt,doc_type:'memo'}});
    aiHideTyping();
    aiAddMsg('assistant',res.content);
  }catch(e){
    aiHideTyping();
    aiAddMsg('system','Ошибка: '+(e.message||'Не удалось сгенерировать'));
  }
}

function aiClear(){aiHistory=[];aiCurrentDocId=null;aiRender();aiAddMsg('system','История очищена. Задайте новый вопрос.')}

function editNomenclature(id,idx,title,dept,years,desc){_nomenclatureModal(id,idx,title,dept,years,desc)}
function _nomenclatureModal(id,idx,title,dept,years,desc){
  var isEdit=!!id;
  var ov=document.createElement('div');ov.className='modal-overlay';ov.onclick=function(e){if(e.target===ov)ov.remove()};
  ov.innerHTML='<div class="modal-card"><div class="modal-header"><h3>'+(isEdit?'Редактировать дело':'Новое дело')+'</h3><button class="modal-close" onclick="this.closest(\'.modal-overlay\').remove()">&times;</button></div>'+
    '<div class="modal-body"><div class="form-group"><label>Индекс *</label><input type="text" id="nmIdx" value="'+esc(idx||'')+'" placeholder="01-01"></div>'+
    '<div class="form-group"><label>Наименование *</label><input type="text" id="nmTitle" value="'+esc(title||'')+'"></div>'+
    '<div class="form-group"><label>Отдел</label><input type="text" id="nmDept" value="'+esc(dept||'')+'"></div>'+
    '<div class="form-group"><label>Срок хранения (лет)</label><input type="number" id="nmYears" value="'+(years||5)+'" min="1"></div>'+
    '<div class="form-group"><label>Описание</label><textarea id="nmDesc" rows="2">'+esc(desc||'')+'</textarea></div></div>'+
    '<div class="modal-footer"><button class="btn btn-outline" onclick="this.closest(\'.modal-overlay\').remove()">Отмена</button>'+
    '<button class="btn btn-primary" id="nmSaveBtn">'+(isEdit?'Сохранить':'Добавить')+'</button></div></div>';
  document.body.appendChild(ov);
  document.getElementById('nmSaveBtn').onclick=async function(){
    var body={index:document.getElementById('nmIdx').value.trim(),title:document.getElementById('nmTitle').value.trim(),
      department:document.getElementById('nmDept').value.trim(),retention_years:parseInt(document.getElementById('nmYears').value)||5,
      description:document.getElementById('nmDesc').value.trim()};
    if(!body.index||!body.title){toast('Заполните индекс и наименование','error');return}
    try{
      if(isEdit){await api('/api/nomenclature/'+id,{method:'PUT',body:body})}
      else{await api('/api/nomenclature',{method:'POST',body:body})}
      ov.remove();toast(isEdit?'Дело обновлено':'Дело добавлено','success');renderNomenclature(document.getElementById('pageContent'));
    }catch(e){toast(e.message,'error')}
  };
}
async function deleteNomenclature(id){if(!confirm('Удалить дело из номенклатуры?'))return;try{await api('/api/nomenclature/'+id,{method:'DELETE'});toast('Дело удалено','success');renderNomenclature(document.getElementById('pageContent'))}catch(e){toast(e.message,'error')}}
async function showNomenclatureDocs(caseId,caseName){
  try{var docs=await api('/api/nomenclature/'+caseId+'/documents')}catch(e){docs=[]}
  var rows=docs.map(function(d){return '<tr><td>'+esc(d.number||'#'+d.id)+'</td><td><a href="#" onclick="event.preventDefault();showPage(\'detail\','+d.id+')">'+esc(d.title)+'</a></td><td>'+esc(DOC_TYPES[d.doc_type]||d.doc_type)+'</td><td>'+(STATUSES[d.status]||d.status)+'</td><td>'+formatDate(d.created_at)+'</td></tr>'}).join('');
  if(!rows)rows='<tr><td colspan="5" style="text-align:center;padding:1rem">Нет документов в этом деле</td></tr>';
  var ov=document.createElement('div');ov.className='modal-overlay';ov.onclick=function(e){if(e.target===ov)ov.remove()};
  ov.innerHTML='<div class="modal-card" style="max-width:700px"><div class="modal-header"><h3>'+esc(caseName)+'</h3><button class="modal-close" onclick="this.closest(\'.modal-overlay\').remove()">&times;</button></div>'+
    '<div class="modal-body" style="padding:0"><table style="width:100%"><thead><tr><th>Номер</th><th>Название</th><th>Тип</th><th>Статус</th><th>Дата</th></tr></thead><tbody>'+rows+'</tbody></table></div>'+
    '<div class="modal-footer"><button class="btn btn-outline" onclick="this.closest(\'.modal-overlay\').remove()">Закрыть</button></div></div>';
  document.body.appendChild(ov);
}

function aiSetDoc(docId){aiCurrentDocId=docId}

function aiFillForm(fill){
  if(!fill)return;
  var fields={title:'dfTitle',description:'dfDesc',content:'dfContent',deadline:'dfDeadline',priority:'dfPriority'};
  Object.keys(fields).forEach(function(key){
    if(fill[key]){
      var el=document.getElementById(fields[key]);
      if(el){el.value=fill[key];el.dispatchEvent(new Event('input',{bubbles:true}))}
    }
  });
  toast('ИИ заполнил форму. Проверьте данные и отправьте.','success');
}

function aiExecuteAction(action,fill){
  if(!action||!action.page)return;
  var page=action.page;
  var param=action.param||null;
  // Delay navigation so user sees the AI message first
  setTimeout(function(){
    if(page==='create'){
      showPage('create');
      setTimeout(function(){
        if(param){
          var typeSelect=document.getElementById('dfType');
          if(typeSelect){typeSelect.value=param;typeSelect.dispatchEvent(new Event('change'))}
        }
        if(fill){
          setTimeout(function(){aiFillForm(fill)},100);
        }
      },200);
    }else if(page==='detail'&&param){
      showPage('detail',parseInt(param));
    }else{
      showPage(page);
    }
  },1500);
}
