name: EDO Daily Auto-Test

on:
  schedule:
    # Every day at 05:00 UTC = 08:00 Moscow time (UTC+3)
    - cron: '0 5 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run auto-tests
        run: python autotest.py
